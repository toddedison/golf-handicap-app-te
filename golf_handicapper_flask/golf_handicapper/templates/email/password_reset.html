<!DOCTYPE html>
<html><body style="font-family:sans-serif; color:#1a3a2a; padding:2rem;">
<h2 style="color:#2d6a4f;">Reset Your Password</h2>
<p>Hi {{ user.name }},</p>
<p>Click below to reset your password. This link expires in 2 hours.</p>
<p>
  <a href="{{ url_for('auth.password_reset', token=token, email=user.email, _external=True) }}"
     style="background:#2d6a4f;color:#fff;padding:.65rem 1.5rem;border-radius:5px;text-decoration:none;font-weight:600;">
    Reset Password
  </a>
</p>
<p style="font-size:.85rem; color:#5a7a68;">If you didn't request this, you can ignore this email.</p>
</body></html>
